<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Page Not Found | The Sword She Never Asked For
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg-main:#17100d;

--gold:#e0a45d;

--cream:#f1ddc2;

--sand:#d7b28f;

--muted:#9a7b67;

--line:
rgba(241,221,194,.10);

}

body{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:25px;

font-family:
Georgia,serif;

background:
linear-gradient(
180deg,
#17100d,
#261815,
#3a261f
);

color:var(--cream);

text-align:center;

overflow:hidden;

}

.error-box{

max-width:750px;

}

.error-number{

font-size:
clamp(
6rem,
18vw,
11rem
);

line-height:1;

color:var(--gold);

margin-bottom:20px;

opacity:.9;

}

h1{

font-size:
clamp(
2rem,
6vw,
3.5rem
);

margin-bottom:30px;

}

p{

max-width:650px;

margin:
0 auto 25px;

line-height:2;

color:var(--sand);

}

.quote{

font-style:italic;

font-size:1.2rem;

color:var(--gold);

margin:
40px auto;

}

.actions{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-top:40px;

}

.btn{

padding:
15px 30px;

border-radius:40px;

text-decoration:none;

background:
rgba(255,255,255,.05);

border:
1px solid var(--line);

color:var(--cream);

transition:.4s;

}

.btn:hover{

transform:
translateY(-4px);

border-color:var(--gold);

}

</style>

</head>

<body>

<div class="error-box">

<div class="error-number">

404

</div>

<h1>

The page may be missing.
The story is not.

</h1>

<p>

Some journeys include silence, uncertainty, and unexpected turns. The page you looked for could not be found, though another path is waiting.

</p>

<p class="quote">

"The sword had done its work. And redemption had the final word."

</p>

<div class="actions">

<a
href="index.html"
class="btn">

Home

</a>

<a
href="contents.html"
class="btn">

Contents

</a>

</div>

</div>

</body>
</html>
